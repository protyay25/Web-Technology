<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="Lab2.css">
    
<style>

body{
    font-family: 'Times New Roman', Times, serif;
    background-color: aliceblue0;
}

h2{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: rgb(51, 0, 255);
    font-weight: bolder;
}

form {
    width: 600px;
    margin: auto;
    padding: 30px;
    background-color: aliceblue;
    border: 1px solid black;
    border-radius: 10px;
}

</style>

</head>

<body>
    
    <h2 style="text-align: center;">Registration Form</h2>

<form action="#" method = "post">

  <label for="fname">Full Name:</label><br>
  <input type="text" id="fname" name="fname" required><br><br>

  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email" required> <br><br>

  <label for="pnumber">Phone Number:</label><br>
  <input type="tel" id="pnumber" name="pnumber" required> <br><br>

  <label for="gender">Gender:</label> <br>
     <input type="radio" name="gender" value="Male"> Male
     <input type="radio" name="gender" value="Female"> Female
     <input type="radio" name="gender" value="Other"> Other <br> <br>
    
  <label for = "dob">Date of Birth:</label><br>
  <input type="date" name="dob" required><br><br>

  <label for = "password">Password:</label><br>
  <input type="password" name="password" required><br><br>

  <label for = "confirmPassword">Confirm Password:</label><br>
  <input type="password" name="confirmPassword" required><br><br>

  <label for = "address">Address:</label><br>
  <textarea name="address" rows="4" cols="25"></textarea><br><br>

  <label for = "department">Department:</label><br>
        <select name="department">
            <option>CSE</option>
            <option>BBA</option>
            <option>EEE</option>
            <option>IPE</option>
        </select> <br><br>
      
<input type="checkbox" id="correct" name="correct" value="correct">
<label for="correct"> Agree to the term and condition</label><br> <br>   

<input class="design" type="submit" value="Register">
<input id = "color" class="design" type="reset" value="Reset">


</form>    

</body>
</html>
